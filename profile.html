<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile | SCOTT CART</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>
      <header class="site-header">
        <div class="header-top">
          <div class="brand-lockup">
            <a class="home-logo" href="home.html">⌂</a>
            <a class="brand-lockup" href="home.html"><span class="logo-mark"></span><span class="logo-copy"><strong>SCOTT CART</strong><span>My profile</span></span></a>
          </div>
          <div class="utility-row">
            <button class="theme-switch" type="button" data-theme-toggle><span class="theme-label">Noir</span></button>
            <a class="utility-link" href="cart.html">Cart <span data-cart-count>0</span></a>
          </div>
        </div>
      </header>
      <main class="page-main">
        <section class="profile-layout">
          <div class="form-card reveal">
            <p class="eyebrow">My Profile</p>
            <h3>Edit your details</h3>
            <form class="form-grid" data-profile-form>
              <input class="input-field" type="text" name="name" placeholder="Username" />
              <input class="input-field" type="email" name="email" placeholder="Email address" />
              <input class="input-field" type="tel" name="phone" placeholder="+911234567890" />
              <select class="select-field" name="gender">
                <option value="">Select gender</option>
                <option value="Men">Men</option>
                <option value="Women">Women</option>
                <option value="Kids">Kids</option>
              </select>
              <button class="primary-button" type="submit">Save Profile</button>
            </form>
          </div>
          <div class="profile-card reveal delay-1">
            <h3>Profile requirements</h3>
            <ul class="info-list">
              <li>Gender is mandatory.</li>
              <li>Phone must start with +91 and stay within India format.</li>
              <li>Email is optional.</li>
            </ul>
            <p style="margin-top: 18px;"><a class="profile-link" href="locations.html">Manage saved locations</a></p>
          </div>
        </section>
      </main>
      <footer class="site-footer"><div class="copyright">Debargha-2026. All rights reserved</div></footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>

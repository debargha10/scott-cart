<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Build Your Dreams | SCOTT CART</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>
      <header class="site-header">
        <div class="header-top">
          <div class="brand-lockup">
            <a class="home-logo" href="home.html">⌂</a>
            <a class="brand-lockup" href="home.html"><span class="logo-mark"></span><span class="logo-copy"><strong>SCOTT CART</strong><span>Build Your Dreams</span></span></a>
          </div>
          <div class="utility-row">
            <button class="theme-switch" type="button" data-theme-toggle><span class="theme-label">Noir</span></button>
            <a class="utility-link" href="cart.html">Cart <span data-cart-count>0</span></a>
          </div>
        </div>
      </header>
      <main class="page-main">
        <section>
          <div class="section-header reveal">
            <p class="eyebrow">Build Your Dreams</p>
            <h1 class="section-title">Sunglasses now have their own destination.</h1>
          </div>
          <div class="product-grid">
            <article class="product-card reveal"><a href="product.html?product=halo-frame"><div class="product-visual"></div></a><p class="mini-label">Sunglasses</p><h3>Halo Frame</h3><div class="price-row"><span class="price-tag">₹3,800</span><a class="product-link" href="product.html?product=halo-frame">View Product</a></div></article>
            <article class="product-card reveal delay-1"><a href="product.html?product=mirror-drift"><div class="product-visual"></div></a><p class="mini-label">Sunglasses</p><h3>Mirror Drift</h3><div class="price-row"><span class="price-tag">₹4,100</span><a class="product-link" href="product.html?product=mirror-drift">View Product</a></div></article>
            <article class="product-card reveal delay-2"><a href="product.html?product=solar-tint"><div class="product-visual"></div></a><p class="mini-label">Sunglasses</p><h3>Solar Tint</h3><div class="price-row"><span class="price-tag">₹3,950</span><a class="product-link" href="product.html?product=solar-tint">View Product</a></div></article>
          </div>
        </section>
      </main>
      <footer class="site-footer"><div class="copyright">Debargha-2026. All rights reserved</div></footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>

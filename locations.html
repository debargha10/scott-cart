<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Locations | SCOTT CART</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>
      <header class="site-header">
        <div class="header-top">
          <div class="brand-lockup">
            <a class="home-logo" href="home.html">⌂</a>
            <a class="brand-lockup" href="home.html"><span class="logo-mark"></span><span class="logo-copy"><strong>SCOTT CART</strong><span>Saved locations</span></span></a>
          </div>
          <div class="utility-row">
            <button class="theme-switch" type="button" data-theme-toggle><span class="theme-label">Noir</span></button>
            <a class="utility-link" href="profile.html" data-auth-button>My Profile</a>
          </div>
        </div>
      </header>
      <main class="page-main">
        <section class="locations-layout">
          <div class="form-card reveal">
            <p class="eyebrow">Locations</p>
            <h3>Location is mandatory before checkout</h3>
            <form class="form-grid" data-location-form>
              <input class="input-field" type="text" name="label" placeholder="Location label like Home or Work" />
              <select class="select-field" name="type">
                <option value="Home">Home</option>
                <option value="Work">Work</option>
                <option value="Other">Other</option>
              </select>
              <div class="button-row">
                <input class="input-field" type="text" name="mapLocation" placeholder="Map location preview" />
                <button class="icon-button" type="button" data-map-detect>📍</button>
              </div>
              <input class="input-field" type="text" name="houseNumber" placeholder="House number" />
              <textarea class="textarea-field" name="fullAddress" placeholder="Full address"></textarea>
              <div class="grid-2">
                <input class="input-field" type="text" name="state" placeholder="State" />
                <input class="input-field" type="text" name="pincode" placeholder="Pincode" />
              </div>
              <button class="primary-button" type="submit">Save Location</button>
            </form>
          </div>
          <div class="grid-2" data-location-list style="grid-template-columns: 1fr;"></div>
        </section>
      </main>
      <footer class="site-footer"><div class="copyright">Debargha-2026. All rights reserved</div></footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
